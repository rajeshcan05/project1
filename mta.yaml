_schema-version: "3.2"
ID: project1
version: 0.0.1

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

modules:
  # ---------------------
  # 1. UI Module
  # ---------------------
  - name: project1
    type: html5
    path: .
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  # ---------------------
  # 2. App Content Module
  # ---------------------
  - name: project1-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: project1-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: project1
          artifacts:
            - project1.zip
          target-path: resources/

  # ---------------------
  # 3. Destination Content Module
  # ---------------------
  - name: project1-destination-content
    type: com.sap.application.content
    path: .
    requires:
      - name: project1-dest-srv
        parameters:
          content-target: true
      - name: project1-repo-host
        parameters:
          service-key:
            name: project1-repo-host-key
      - name: project1-uaa
        parameters:
          service-key:
            name: project1-uaa-key
    parameters:
      content:
        instance:
          destinations:
            - Name: project1_html_repo_host
              ServiceInstanceName: project1-html5-service
              ServiceKeyName: project1-repo-host-key
              sap.cloud.service: project1
            - Authentication: OAuth2UserTokenExchange
              Name: project1_uaa
              ServiceInstanceName: project1-xsuaa-service
              ServiceKeyName: project1-uaa-key
              sap.cloud.service: project1
          existing_destinations_policy: update
    build-parameters:
      no-source: true

resources:
  - name: project1-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
      service-name: project1-html5-service

  - name: project1-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
      service-name: project1-xsuaa-service

  - name: project1-dest-srv
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      service-name: project1-destination-service
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update